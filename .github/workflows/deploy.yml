# GitHub Pages 자동 배포 워크플로우
# main 브랜치에 push하면 자동으로 빌드 → GitHub Pages에 배포

name: Deploy to GitHub Pages

on:
  # main 브랜치에 push 시 실행
  push:
    branches: [main]
  # 수동 실행 허용
  workflow_dispatch:

# GitHub Pages 배포 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. Astro 빌드
      - name: Build with Astro
        run: npm run build

      # 5. GitHub Pages 설정
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. 빌드 결과물 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 7. GitHub Pages에 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
